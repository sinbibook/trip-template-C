<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-page-title></title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <!-- Preload critical resources -->
    <link rel="preload" href="styles/theme.css" as="style">
    <link rel="preload" href="styles/common.css" as="style">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/directions.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <!-- MAPPER: customFields.pages.directions.sections[0].hero.images[isSelected] -->
        <div class="con01" data-aos="fade-up">
          <div class="img swiper-container">
            <div class="swiper-wrapper" data-directions-hero-slides></div>
          </div>
          <div class="tx1_1">오시는길</div>
        </div>
        <div class="con14 w1440">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx1">TRAFFIC</div>
            <div class="tx2">
              <span class="bold spot">찾아오시는 길</span>
            </div>
          </div>
          <!-- MAPPER: property.latitude, property.longitude, property.address -->
          <div class="map_wrap" data-aos="fade-up">
            <div class="map_inner">
              <div id="kakao-map"></div>
            </div>
          </div>
          <!-- MAPPER: property.address -->
          <div class="address" data-aos="fade-up">
            <div class="tx1">네비게이션 이용 시</div>
            <div class="tx2">
              도로명 주소 ｜
              <!-- MAPPER: property.address -->
              <span class="underline" data-directions-address></span>
            </div>
          </div>
          <!-- MAPPER: customFields.pages.directions.sections[0].notice.title + description -->
          <div class="address notice" data-aos="fade-up">
            <div class="tx1" data-directions-notice-title>이용안내</div>
            <div class="tx2" data-directions-notice-description>
              - 버스 이용시 : 00번 버스 이용<br>
              - 자가 이용시 : 네비게이션에 주소를 검색하고 와주세요.
            </div>
          </div>
        </div>
        <div class="con4">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx0">Make your Stay Even Better</div>
            <!-- MAPPER: property.name (typing 섹션) -->
            <div class="typing-container tx2">
              <div class="typing-wrapper">
                <div class="typing-line-wrapper">
                  <div id="typing1" class="typing-line"></div>
                  <div class="cursor" id="cursor1"></div>
                </div>
                <div class="typing-line-wrapper">
                  <div id="typing2" class="typing-line bold spot"></div>
                  <div class="cursor" id="cursor2"></div>
                </div>
              </div>
            </div>
          </div>
          <!-- MAPPER: property.name + property.nameEn (con4 하단) -->
          <div class="t0" data-aos="fade-up">
            <span class="t1"></span>
            <span class="bar">|</span>
            <span class="t2"></span>
          </div>
          <a href="#!" data-booking-link class="btnBooking" data-aos="fade-up">
            <div class="circle">
              <img src="images/icon_plus_black.png" alt="" />
              <div class=""><em class="black">BOOKING</em></div>
              <div class="cover"><em class="white">BOOKING</em></div>
            </div>
          </a>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <!-- Kakao Map SDK -->
    <script type="text/javascript" src="js/kakao-maps-sdk.js"></script>
    <script src="js/preview-handler.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/directions-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common.js"></script>
    <script src="js/pages/directions.js"></script>
  </body>
</html>
