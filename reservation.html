<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-page-title></title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <!-- Preload critical resources -->
    <link rel="preload" href="styles/theme.css" as="style">
    <link rel="preload" href="styles/common.css" as="style">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/reservation.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <!-- MAPPER: customFields.pages.reservation.sections[0].hero.images[isSelected] -->
        <div class="con01" data-aos="fade-up">
          <div class="img swiper-container">
            <div class="swiper-wrapper" data-reservation-hero-slides></div>
          </div>
          <div class="tx1_1">이용안내</div>
        </div>
        <div class="conReservation w1440">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx1">INFORMATION</div>
            <div class="tx2">
              <div class="bold spot">펜션정보</div>
            </div>
          </div>

          <!-- MAPPER: property.usageGuide, reservationGuide, checkInOutInfo; property.refundPolicies -->
          <div class="reservationWrap" data-aos="fade-up">
            <!-- MAPPER: property.usageGuide -->
            <div class="accordion">
              <div class="accordionHeader" data-target="usage-content">
                <span class="accordionTitle">이용안내</span>
                <span class="accordionIcon">+</span>
              </div>
              <div class="accordionContent active" id="usage-content" data-reservation-usage-content></div>
            </div>

            <!-- MAPPER: property.reservationGuide -->
            <div class="accordion">
              <div class="accordionHeader" data-target="reservation-guide-content">
                <span class="accordionTitle">예약안내</span>
                <span class="accordionIcon">+</span>
              </div>
              <div class="accordionContent active" id="reservation-guide-content" data-reservation-guide-content></div>
            </div>

            <!-- MAPPER: property.checkInOutInfo -->
            <div class="accordion">
              <div class="accordionHeader" data-target="checkin-content">
                <span class="accordionTitle">입/퇴실 안내</span>
                <span class="accordionIcon">+</span>
              </div>
              <div class="accordionContent active" id="checkin-content" data-reservation-checkin-content></div>
            </div>

          </div>

        <!-- MAPPER: property.refundPolicies[] (refundProcessingDays, refundRate) -->
        <div class="conRefund w1440">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx1">REFUND INFO</div>
            <div class="tx2">
              <span class="bold spot">환불정보</span>
            </div>
          </div>
          <div class="bottom" data-aos="fade-up" data-reservation-refund-table></div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/preview-handler.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/reservation-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common.js"></script>
    <script src="js/pages/reservation.js"></script>
  </body>
</html>
