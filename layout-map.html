<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-page-title></title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <!-- Preload critical resources -->
    <link rel="preload" href="styles/theme.css" as="style">
    <link rel="preload" href="styles/common.css" as="style">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/layout-map.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <!-- MAPPER: customFields.pages.layout-map.sections[0].hero.images[isSelected] -->
        <div class="con01" data-aos="fade-up">
          <div class="img swiper-container">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <div class="img" data-layout-map-hero-image></div>
              </div>
            </div>
          </div>
          <div class="tx1_1">객실 미리보기</div>
        </div>

        <!-- MAPPER: customFields.pages.layout-map.sections[0].about + images -->
        <div class="con14 w1440">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx1">ROOM PREVIEW</div>
            <div class="tx2">
              <span class="bold spot">객실 배치도</span>
            </div>
          </div>
          <div class="img" data-aos="fade-up">
            <img src="images/con14_1.png" alt="배치도" data-layout-map-image-0 />
          </div>
        </div>

        <div class="con1">
          <div class="w1440">
            <div class="conTitle" data-aos="fade-up">
              <div class="tx1">ROOM PREVIEW</div>
              <div class="tx2">
                여유롭고 특별한 공간<br />
                <!-- MAPPER: property.name -->
                <div class="bold spot" data-property-name></div>
              </div>
            </div>
            <div class="swiper-pagination" data-aos="fade-up"></div>
            <div class="swiperControl">
              <div class="fraction">
                <div class="number"></div>
                <span class="bar">/</span>
                <div class="total"></div>
              </div>
              <div class="navi">
                <div class="swiper-button-prev">
                  <img src="images/icon_left_2.png" alt="" />
                </div>
                <div class="swiper-button-next">
                  <img src="images/icon_right_2.png" alt="" />
                </div>
              </div>
            </div>
            <!-- MAPPER: rooms[].images[0].thumbnail[0].url + name + description -->
            <div class="swiper right" data-aos="fade-left">
              <div class="swiper-wrapper" data-index-room-slides></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/layout-map-mapper.js"></script>
    <script src="js/data-mapper/pages/index-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common.js"></script>
    <script src="js/pages/layout-map.js"></script>
  </body>
</html>
