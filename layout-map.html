<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-page-title></title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/layout-map.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <div class="con0" data-aos="fade-up">
          <div class="swiper">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <img src="images/con0_1.png" alt="" data-layout-map-hero-image />
                <div class="tx1">배치도</div>
              </div>
            </div>
          </div>
        </div>
        <div class="conLayoutMap w1440">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx1">LAYOUT MAP</div>
            <div class="tx2">
              <div class="bold spot" data-layout-map-about-title>숙소 배치도</div>
            </div>
          </div>
          <div class="mapDesc" data-aos="fade-up">
            <p data-layout-map-about-description>펜션 내 시설 배치를 확인하실 수 있습니다.</p>
          </div>
          <div class="mapContent" data-aos="fade-up">
            <div class="mapItem">
              <img src="images/con14_1.png" alt="배치도" data-layout-map-image-0 />
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/layout-map-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common.js"></script>
    <script src="js/pages/layout-map.js"></script>
  </body>
</html>
