<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - 페이지를 찾을 수 없습니다</title>
    <link rel="stylesheet" href="styles/common.css" />
    <style>
      html, body { height: 100%; }
      body {
        display: flex;
        flex-direction: column;
        background-color: #f5f6f8;
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .errorContainer {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 150px 20px 100px;
        text-align: center;
      }
      .errorCode {
        font-size: 120px;
        font-weight: 900;
        color: #2d3a80;
        line-height: 1;
        margin-bottom: 20px;
        letter-spacing: -4px;
      }
      .errorTitle {
        font-size: 28px;
        font-weight: 700;
        color: #111;
        margin-bottom: 15px;
      }
      .errorMessage {
        font-size: 16px;
        color: #555;
        margin-bottom: 50px;
        line-height: 1.8;
        max-width: 480px;
      }
      @media (max-width: 1180px) {
        .errorCode { font-size: 80px; }
        .errorTitle { font-size: 22px; }
        .errorMessage { font-size: 14px; }
        .errorContainer { padding: 100px 20px 80px; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="errorContainer">
        <div class="errorCode">404</div>
        <h1 class="errorTitle">페이지를 찾을 수 없습니다.</h1>
        <p class="errorMessage">
          요청하신 페이지가 존재하지 않거나 비활성화되었습니다.<br />
          홈으로 돌아가기 버튼을 클릭해주세요.
        </p>
        <a href="index.html" class="btnBooking_2">홈으로 돌아가기</a>
      </div>
    </main>

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common.js"></script>
  </body>
</html>
