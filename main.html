<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-page-title></title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <!-- Preload critical resources -->
    <link rel="preload" href="styles/theme.css" as="style">
    <link rel="preload" href="styles/common.css" as="style">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <!-- MAPPER: customFields.pages.main.sections[0].hero.images[isSelected] -->
        <div class="con0" data-aos="fade-up">
          <div class="swiper">
            <div class="swiper-wrapper" data-main-hero-slides>
              <div class="swiper-slide">
                <img src="images/con0_2.png" alt="" />
                <div class="tx1">하드코딩</div>
              </div>
              <div class="swiper-slide">
                <img src="images/con0_1.png" alt="" />
                <div class="tx1">하드코딩</div>
              </div>
              <div class="swiper-slide">
                <img src="images/con0_1.png" alt="" />
                <div class="tx1">하드코딩</div>
              </div>
            </div>
            <div class="swiperNavi">
              <div class="swiper-button-prev">
                <img src="images/icon_left_1.png" alt="" />
                Prev
              </div>
              <div class="bar"></div>
              <div class="swiper-button-next">
                Next
                <img src="images/icon_right_1.png" alt="" />
              </div>
            </div>
          </div>
        </div>
        <div class="con6 w1440">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx1">ABOUT &amp; VIEW</div>
            <div class="tx2">
              쉼이 필요한 날,<br />
              <!-- MAPPER: property.name + 을/를 판별 -->
              <div class="bold spot" data-about-title></div>
            </div>
          </div>
          <!-- MAPPER: customFields.pages.main.sections[0].about[0].images[0].url -->
          <div class="img">
            <img src="images/con6_1.png" alt="" data-aos="fade-up" data-main-about-image />
          </div>
          <!-- MAPPER: customFields.pages.main.sections[0].about[0].description -->
          <div class="txWrap" data-aos="fade-up" data-main-about-description>
            <div class="t1">
            </div>
          </div>
          <div class="bottom">
            <span class="bar"></span>
            <!-- MAPPER: homepage.customFields.property.name -->
            <span class="t2" data-property-name>하드코딩</span>
          </div>
        </div>
        <!-- MAPPER: homepage.customFields.property.images[category=property_exterior] -->
        <div class="con7" data-main-gallery>
          <div class="img"><img src="images/con7_1.png" alt="" /></div>
          <div class="img"><img src="images/con7_1.png" alt="" /></div>
          <div class="img"><img src="images/con7_1.png" alt="" /></div>
          <div class="img"><img src="images/con7_1.png" alt="" /></div>
        </div>
        <div class="con4">
          <div class="conTitle" data-aos="fade-up">
            <div class="tx0">Make your Stay Even Better</div>
            <!-- MAPPER: property.name (typing 섹션) -->
            <div class="typing-container tx2">
              <div class="typing-wrapper">
                <div class="typing-line-wrapper">
                  <div id="typing1" class="typing-line"></div>
                  <div class="cursor" id="cursor1"></div>
                </div>
                <div class="typing-line-wrapper">
                  <div id="typing2" class="typing-line bold spot"></div>
                  <div class="cursor" id="cursor2"></div>
                </div>
              </div>
            </div>
          </div>
          <!-- MAPPER: property.name + property.nameEn (con4 하단) -->
          <div class="t0" data-aos="fade-up">
            <span class="t1"></span>
            <span class="bar">|</span>
            <span class="t2"></span>
          </div>
          <a href="#!" data-booking-link class="btnBooking" data-aos="fade-up">
            <div class="circle">
              <img src="images/icon_plus_black.png" alt="" />
              <div class=""><em class="black">BOOKING</em></div>
              <div class="cover"><em class="white">BOOKING</em></div>
            </div>
          </a>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/main-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common.js"></script>
    <script src="js/pages/main.js"></script>
  </body>
</html>
