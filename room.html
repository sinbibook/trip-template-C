<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-page-title></title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <!-- Preload critical resources -->
    <link rel="preload" href="styles/theme.css" as="style">
    <link rel="preload" href="styles/common.css" as="style">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/room.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <!-- MAPPER: rooms[current].images[0].interior[isSelected] + name -->
        <div class="con0" data-aos="fade-up">
          <div class="swiper">
            <div class="swiper-wrapper" data-room-hero-slides></div>
            <div class="swiperNavi">
              <div class="swiper-button-prev">
                <img src="images/icon_left_1.png" alt="" />
                Prev
              </div>
              <div class="bar"></div>
              <div class="swiper-button-next">
                Next
                <img src="images/icon_right_1.png" alt="" />
              </div>
            </div>
          </div>
        </div>
        <div class="con8">
          <div class="w1440">
            <!-- MAPPER: rooms[current].name + description + images[0].thumbnail[0].url -->
            <div class="textWrap">
              <div class="conTitle2">
                <div class="tx1">ROOM</div>
                <!-- MAPPER: rooms[current].name -->
                <div class="tx2">
                  <div class="spot" data-room-name></div>
                </div>
                <!-- MAPPER: rooms[current].description -->
                <div class="tx3" data-room-description></div>
              </div>
              <a href="#!" data-booking-link class="btnBooking_2">BOOKING</a>
            </div>
            <!-- MAPPER: rooms[?id].images[0].thumbnail[0].url -->
            <div class="imgWrap">
              <img src="images/con8_1.png" alt="" data-room-main-image />
            </div>
          </div>
        </div>
        <div class="con9 w1440">
          <!-- PC 버전 -->
          <div class="price_table for_pc">
            <!-- MAPPER: rooms[current].name/baseOccupancy/maxOccupancy/description/size -->
            <table cellspacing="0" cellpadding="0" class="table_default">
              <thead>
                <tr>
                  <th style="width: 15%;">객실명</th>
                  <th style="width: 5%;">기준</th>
                  <th style="width: 5%;">최대</th>
                  <th style="width: 20%;">유형</th>
                  <th style="width: 20%;">평형</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td data-room-name></td>
                  <td data-room-base-occupancy></td>
                  <td data-room-max-occupancy></td>
                  <td data-room-type></td>
                  <td data-room-size></td>
                </tr>
              </tbody>
            </table>
            <!-- MAPPER: rooms[current].amenities (집기품목) -->
            <ul class="table_text">
              <li>
                <strong>집기품목</strong> :
                <span data-room-amenities></span>
              </li>
            </ul>
          </div>

          <!-- 모바일 버전 -->
          <div class="price_table for_m">
            <!-- MAPPER: rooms[current].name/baseOccupancy/maxOccupancy/description/size -->
            <table cellspacing="0" cellpadding="0" class="table_default">
              <thead>
                <tr>
                  <th>객실명</th>
                  <th>기준</th>
                  <th>최대</th>
                  <th>유형</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td data-room-name></td>
                  <td data-room-base-occupancy></td>
                  <td data-room-max-occupancy></td>
                  <td data-room-type></td>
                </tr>
              </tbody>
            </table>
            <!-- MAPPER: rooms[current].amenities (집기품목) -->
            <ul class="table_text">
              <li>
                <strong>집기품목</strong> :
                <span data-room-amenities></span>
              </li>
            </ul>
          </div>
        </div>

        <!-- MAPPER: rooms[?id].images[0].exterior[isSelected][0~1] -->
        <div class="con10 w1440">
          <img src="images/con10_1.png" alt="" data-room-image-0 />
          <img src="images/con10_2.png" alt="" data-room-image-1 />
        </div>
        <div class="con1">
          <div class="w1440">
            <div class="conTitle" data-aos="fade-up">
              <div class="tx1">ROOM PREVIEW</div>
              <div class="tx2">
                여유롭고 특별한 공간<br />
                <!-- MAPPER: property.name -->
                <div class="bold spot" data-property-name></div>
              </div>
            </div>
            <div class="swiper-pagination" data-aos="fade-up"></div>
            <div class="swiperControl">
              <div class="fraction">
                <div class="number"></div>
                <span class="bar">/</span>
                <div class="total"></div>
              </div>
              <div class="navi">
                <div class="swiper-button-prev">
                  <img src="images/icon_left_2.png" alt="" />
                </div>
                <div class="swiper-button-next">
                  <img src="images/icon_right_2.png" alt="" />
                </div>
              </div>
            </div>
            <!-- MAPPER: rooms[].images[0].thumbnail[0].url + name + description -->
            <div class="swiper right" data-aos="fade-left">
              <div class="swiper-wrapper" data-index-room-slides></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/room-mapper.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common.js"></script>
    <script src="js/pages/room.js"></script>
  </body>
</html>
